# Joomla Extension CI Pipeline
# Copy this to .github/workflows/joomla-ci.yml in your project.
#
# Topology: joomla-extension (apexyard topology v1.0.0)
# Purpose: PHP quality checks + static analysis + unit tests + extension package build
#
# Tools assumed:
#   - Composer for dependency management
#   - PHP-CS-Fixer or phpcs for PSR-12 style checking
#   - PHPStan for static analysis (level 5+)
#   - PHPUnit for unit + integration tests
#   - zip for extension package build

name: Joomla Extension CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read
  pull-requests: write
  checks: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: "Quality + Tests"
    runs-on: ubuntu-latest

    strategy:
      matrix:
        php-version: ['8.2', '8.3']
      fail-fast: false

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: joomla_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd "mysqladmin ping -h localhost"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup PHP ${{ matrix.php-version }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-version }}
          extensions: dom, curl, libxml, mbstring, zip, pdo, mysql, pdo_mysql, gd, intl
          coverage: xdebug
          tools: composer:v2

      - name: Get Composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress

      # PSR-12 style check (PHP-CS-Fixer)
      - name: Code Style (PHP-CS-Fixer)
        id: style
        run: |
          if [ -f .php-cs-fixer.dist.php ]; then
            vendor/bin/php-cs-fixer fix --dry-run --diff --format=json 2>&1 | tee cs-output.json || true
            ERRORS=$(php -r "echo count(json_decode(file_get_contents('cs-output.json'), true)['files'] ?? []);")
            echo "errors=$ERRORS" >> $GITHUB_OUTPUT
            if [ "$ERRORS" -gt 0 ]; then
              echo "::error::Found $ERRORS code style violations"
              vendor/bin/php-cs-fixer fix --dry-run --diff
              exit 1
            fi
          elif [ -f phpcs.xml ] || [ -f phpcs.xml.dist ]; then
            vendor/bin/phpcs --standard=PSR12 --extensions=php src/ 2>&1 | tee phpcs-output.txt || true
            ERRORS=$(grep -c "ERROR" phpcs-output.txt || echo "0")
            echo "errors=$ERRORS" >> $GITHUB_OUTPUT
            if [ "$ERRORS" -gt 0 ]; then
              exit 1
            fi
          else
            echo "No code style config found — skipping"
            echo "errors=0" >> $GITHUB_OUTPUT
          fi

      # PHPStan static analysis (level 5+)
      - name: Static Analysis (PHPStan)
        id: phpstan
        run: |
          if [ -f phpstan.neon ] || [ -f phpstan.neon.dist ]; then
            vendor/bin/phpstan analyse --error-format=github --no-progress 2>&1 | tee phpstan-output.txt || true

            ERRORS=$(grep -c "error" phpstan-output.txt || echo "0")
            echo "errors=$ERRORS" >> $GITHUB_OUTPUT

            if grep -q "error" phpstan-output.txt; then
              echo "::error::PHPStan found errors"
              exit 1
            fi
          else
            echo "No phpstan.neon found — skipping"
            echo "errors=0" >> $GITHUB_OUTPUT
          fi

      # PHPUnit tests with coverage
      - name: Unit Tests + Coverage (PHPUnit)
        id: tests
        env:
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_DATABASE: joomla_test
          DB_USERNAME: root
          DB_PASSWORD: root
        run: |
          if [ -f phpunit.xml ] || [ -f phpunit.xml.dist ]; then
            vendor/bin/phpunit --colors=always --coverage-text --coverage-clover=coverage.xml 2>&1 | tee phpunit-output.txt

            if grep -q "FAILURES\|ERRORS" phpunit-output.txt; then
              echo "status=fail" >> $GITHUB_OUTPUT
              exit 1
            else
              echo "status=pass" >> $GITHUB_OUTPUT
            fi
          else
            echo "No phpunit.xml found — skipping"
            echo "status=skip" >> $GITHUB_OUTPUT
          fi

      # Manifest validation — check the extension manifest XML is well-formed
      - name: Validate Manifest XML
        id: manifest
        run: |
          MANIFEST=$(find . -maxdepth 2 -name "*.xml" -exec grep -l '<extension' {} \; | head -1)
          if [ -n "$MANIFEST" ]; then
            echo "Validating $MANIFEST"
            php -r "
              \$doc = new DOMDocument();
              \$doc->load('$MANIFEST');

              // Check required elements
              \$ext = \$doc->getElementsByTagName('extension')->item(0);
              if (!\$ext) { echo '::error::No <extension> root element'; exit(1); }

              \$ns = \$doc->getElementsByTagName('namespace');
              if (\$ns->length === 0) { echo '::warning::No <namespace> element — PSR-4 autoloading may not work'; }

              \$version = \$doc->getElementsByTagName('version');
              if (\$version->length === 0) { echo '::error::No <version> element'; exit(1); }

              echo 'Manifest valid: ' . \$ext->getAttribute('type') . ' v' . \$version->item(0)->textContent;
            "
            echo "status=pass" >> $GITHUB_OUTPUT
          else
            echo "No extension manifest found"
            echo "status=skip" >> $GITHUB_OUTPUT
          fi

      # Build the installable extension package
      - name: Build Extension Package
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          MANIFEST=$(find . -maxdepth 2 -name "*.xml" -exec grep -l '<extension' {} \; | head -1)
          if [ -n "$MANIFEST" ]; then
            VERSION=$(php -r "\$d=new DOMDocument(); \$d->load('$MANIFEST'); echo \$d->getElementsByTagName('version')->item(0)->textContent;")
            EXT_NAME=$(basename "$MANIFEST" .xml)
            PACKAGE="${EXT_NAME}-${VERSION}.zip"

            # Exclude dev files from the package
            zip -r "$PACKAGE" . \
              -x ".git/*" \
              -x ".github/*" \
              -x "tests/*" \
              -x "vendor/*" \
              -x "node_modules/*" \
              -x ".php-cs-fixer*" \
              -x "phpstan*" \
              -x "phpunit*" \
              -x "composer.lock" \
              -x ".gitignore" \
              -x "*.zip"

            echo "Built $PACKAGE"
          fi

      # Generate summary
      - name: Generate Summary
        if: always()
        run: |
          cat << EOF >> $GITHUB_STEP_SUMMARY
          # Joomla Extension CI Report (PHP ${{ matrix.php-version }})

          | Check | Status |
          |-------|--------|
          | Code Style (PSR-12) | ${{ steps.style.outputs.errors == '0' && 'Pass' || 'Fail' }} |
          | PHPStan | ${{ steps.phpstan.outputs.errors == '0' && 'Pass' || 'Fail' }} |
          | PHPUnit | ${{ steps.tests.outputs.status || 'skip' }} |
          | Manifest XML | ${{ steps.manifest.outputs.status || 'skip' }} |

          ---
          Topology: joomla-extension v1.1.0
          EOF

  # ---------------------------------------------------------------------------
  # JED-readiness proxy.
  #
  # This is NOT JEDChecker. JEDChecker (joomla-extensions/jedchecker) is a Joomla
  # admin component with no CLI or reusable GitHub Action, so it cannot run in CI.
  # This job is a fast PROXY for its cheapest-to-automate rules (GplRule, JexecRule,
  # ErrorReportingRule, LanguageRule basics) so JED-blocking mistakes are caught on
  # every PR. Before submitting to the JED, still run the real JEDChecker component
  # on a Joomla test site. See handbooks/domain/joomla-jed/jed-listing-readiness.md.
  # ---------------------------------------------------------------------------
  jed-readiness:
    name: "JED-readiness (proxy)"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: _JEXEC guard on every PHP file (JexecRule)
        run: |
          missing=$(grep -rL --include='*.php' "_JEXEC" . | grep -vE '(^|/)(vendor|tests|node_modules)/' || true)
          if [ -n "$missing" ]; then
            echo "::error::PHP files missing 'defined('_JEXEC') or die;' (JEDChecker JexecRule):"
            echo "$missing"
            exit 1
          fi
          echo "All PHP files carry the _JEXEC guard."

      - name: GPL license header on every PHP file (GplRule)
        run: |
          missing=$(grep -riL --include='*.php' -E "GNU General Public License|GPL" . | grep -vE '(^|/)(vendor|tests|node_modules)/' || true)
          if [ -n "$missing" ]; then
            echo "::error::PHP files missing a GPL license header (JEDChecker GplRule):"
            echo "$missing"
            exit 1
          fi
          echo "All PHP files carry a GPL header."

      - name: No error_reporting(0) (ErrorReportingRule)
        run: |
          hits=$(grep -rn --include='*.php' -E "error_reporting\s*\(\s*0\s*\)" . | grep -vE '(^|/)(vendor|tests|node_modules)/' || true)
          if [ -n "$hits" ]; then
            echo "::error::error_reporting(0) is disallowed (JEDChecker ErrorReportingRule):"
            echo "$hits"
            exit 1
          fi
          echo "No error_reporting(0) found."

      - name: Language INI lint (LanguageRule basics)
        run: |
          rc=0
          while IFS= read -r f; do
            [ -z "$f" ] && continue
            # BOM check
            if head -c3 "$f" | grep -q $'\xEF\xBB\xBF'; then
              echo "::error::$f has a UTF-8 BOM (JEDChecker LanguageRule)"; rc=1
            fi
            lineno=0
            declare -A seen=()
            while IFS= read -r line || [ -n "$line" ]; do
              lineno=$((lineno+1))
              case "$line" in ''|';'*) continue;; esac
              key=${line%%=*}
              # whitespace in key
              if printf '%s' "$key" | grep -q '[[:space:]]'; then
                echo "::error::$f:$lineno key has whitespace: '$key'"; rc=1
              fi
              # uppercase ASCII key
              if printf '%s' "$key" | grep -qE '[^A-Z0-9_]'; then
                echo "::error::$f:$lineno key not UPPERCASE/ASCII: '$key'"; rc=1
              fi
              # duplicate key
              if [ -n "${seen[$key]:-}" ]; then
                echo "::error::$f:$lineno duplicate key '$key' (first on line ${seen[$key]})"; rc=1
              fi
              seen[$key]=$lineno
              # quoted value
              val=${line#*=}
              case "$val" in \"*\") ;; *) echo "::error::$f:$lineno value not double-quoted: '$line'"; rc=1;; esac
            done < "$f"
            unset seen
          done < <(find . -name '*.ini' -path '*/language/*' | grep -vE '(^|/)(vendor|tests|node_modules)/')
          [ "$rc" -eq 0 ] && echo "Language INI files pass the proxy lint."
          exit $rc
